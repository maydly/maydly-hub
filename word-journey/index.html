<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>maydly · 촬영 전, 오늘의 나 — 단어 여정 (체험판 데모)</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%8D%80%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --R:#7ab87a;        /* 메인 그린 */
    --Rd:#5a9a5a;       /* 진한 그린 */
    --Rdd:#47814a;      /* 더 진한 그린 */
    --tx:#2a3a2a;
    --tx2:#54665a;
    --bg:#fefefe;
    --soft:#f4f8f3;
    --line:#dfe9dd;
    --copybg:#eef6ec;
    --copyline:#bcdcb6;
    --minus:#c97b4a;
    --minusd:#a8631f;
    --minusbg:#fbf1e9;
    --minusline:#e7c8a8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--soft); color:var(--tx);
    font-family:"Noto Serif KR","Nanum Myeongjo",Georgia,serif;
    line-height:1.8; font-size:16.5px; -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:760px; margin:0 auto; min-height:100vh;
    background:#f0f6ef url("data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'112'%20height%3D'112'%3E%3Cg%20fill%3D'%234f9a6a'%20fill-opacity%3D'0.035'%3E%3Cg%20transform%3D'translate(28%2C28)'%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.46)%20rotate(0)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.46)%20rotate(90)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.46)%20rotate(180)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.46)%20rotate(270)'%2F%3E%3C%2Fg%3E%3Cg%20transform%3D'translate(84%2C86)'%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.32)%20rotate(0)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.32)%20rotate(90)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.32)%20rotate(180)'%2F%3E%3Cpath%20d%3D'M0%200%20C-2.4%2C-10.5%20-17%2C-15.5%20-17%2C-27.5%20C-17%2C-36.5%20-8%2C-40.5%200%2C-32.5%20C8%2C-40.5%2017%2C-36.5%2017%2C-27.5%20C17%2C-15.5%202.4%2C-10.5%200%2C0%20Z'%20transform%3D'scale(0.32)%20rotate(270)'%2F%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E"); box-shadow:0 0 40px rgba(90,154,90,.08);
    display:flex; flex-direction:column;
  }

  /* ── 상단 헤더 ── */
  .top{
    padding:20px 24px 14px; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:rgba(254,254,254,.96);
    backdrop-filter:blur(6px); z-index:5;
  }
  .brand{
    font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif; font-weight:700;
    font-size:1.6rem; color:var(--tx); letter-spacing:-.3px;
  }
  .brand .clover{font-style:normal;}
  .stepline{
    display:flex; align-items:center; gap:10px; margin-top:10px;
  }
  .pill{
    font-family:Georgia,serif; font-size:.74rem; background:var(--R); color:#fff;
    border-radius:14px; padding:2px 11px; flex:none;
  }
  .pill.minus{background:var(--minus);}
  .pill.done{background:var(--Rdd);}
  .bar{
    flex:1; height:7px; background:var(--soft); border:1px solid var(--line);
    border-radius:6px; overflow:hidden;
  }
  .bar > i{
    display:block; height:100%; width:0%;
    background:linear-gradient(90deg,var(--R),var(--Rd)); transition:width .4s ease;
  }
  .bar.minus > i{background:linear-gradient(90deg,#e6a878,var(--minus));}

  /* ── 본문 스크롤 영역 ── */
  .body{flex:1; padding:22px 24px 20px; overflow-y:auto;}

  .arc{
    background:linear-gradient(90deg,#e6f3e3,#f4f8f3);
    border:1px solid var(--copyline); border-left:6px solid var(--R);
    border-radius:10px; padding:12px 16px; margin:0 0 14px;
    font-size:1rem; color:var(--Rd); font-weight:700; line-height:1.6;
  }
  .arc .nowtag{font-family:Georgia,serif; font-style:italic; margin-right:5px; color:var(--R);}
  .arc.minus{background:linear-gradient(90deg,#fbeee0,#fdf6ef); border-left-color:var(--minus); color:var(--minus);}
  .arc.minus .nowtag{color:var(--minus);}
  .guide{color:var(--tx2); font-size:.98rem; margin:0 0 16px; line-height:1.75;}
  .guide strong{color:var(--Rd);}

  .counter{
    display:inline-flex; align-items:center; gap:8px; margin:0 0 14px;
    background:var(--soft); border:1px solid var(--line); border-radius:20px;
    padding:5px 14px; font-size:.92rem; color:var(--tx2);
  }
  .counter b{color:var(--Rd); font-size:1.05rem;}
  .counter.over b{color:var(--minusd);}
  .counter.minus b{color:var(--minus);}
  /* 하단 고정바 안의 카운터(스크롤 중 항상 보임) */
  .counterbar{display:flex; justify-content:center;}
  .counterbar .counter{margin:0; background:#fff; border-color:var(--copyline);}
  .counterbar .counter.minus{border-color:var(--minusline);}

  /* ── 단어 칩 ── */
  .grp{margin:6px 0 16px;}
  .grp .gh{
    font-size:.86rem; color:var(--tx2); font-weight:700; margin:12px 0 8px;
    letter-spacing:.3px; border-bottom:1px dashed var(--line); padding-bottom:5px;
  }
  .chips{display:flex; flex-wrap:wrap; gap:9px;}
  .chip{
    background:#fff; border:1.5px solid var(--copyline); color:var(--Rd);
    padding:8px 15px; border-radius:22px; font-size:.98rem; font-weight:700;
    cursor:pointer; user-select:none; transition:all .12s ease;
    font-family:inherit;
  }
  .chip:hover{border-color:var(--R); background:var(--soft);}
  .chip.on{
    background:var(--R); border-color:var(--R); color:#fff;
    box-shadow:0 3px 10px rgba(122,184,122,.32);
  }
  .chip.minus{border-color:var(--minusline); color:var(--minus); background:var(--minusbg);}
  .chip.minus:hover{border-color:var(--minus);}
  .chip.minus.on{background:var(--minus); border-color:var(--minus); color:#fff; box-shadow:0 3px 10px rgba(201,123,74,.32);}

  /* ── 하단 액션바 ── */
  .foot{
    padding:14px 24px 20px; border-top:1px solid var(--line);
    background:#fff; position:sticky; bottom:0;
    display:flex; flex-direction:column; gap:10px;
  }
  .btnrow{display:flex; gap:10px; align-items:center;}
  .btn{
    font-family:inherit; font-weight:700; font-size:1rem; cursor:pointer;
    border-radius:11px; padding:13px 20px; border:1.5px solid transparent;
    transition:all .15s ease;
  }
  .btn.primary{background:var(--R); color:#fff; flex:1; border-color:var(--R);}
  .btn.primary:hover{background:var(--Rd);}
  .btn.primary:disabled{background:#cfe0cd; border-color:#cfe0cd; cursor:not-allowed; color:#fff;}
  .btn.primary.minus{background:var(--minus); border-color:var(--minus);}
  .btn.primary.minus:hover{background:var(--minusd);}
  .btn.ghost{background:#fff; color:var(--tx2); border-color:var(--line); flex:none;}
  .btn.ghost:hover{border-color:var(--Rd); color:var(--Rd);}
  .softlink{
    background:none; border:none; color:var(--tx2); font-family:inherit;
    font-size:.9rem; cursor:pointer; text-decoration:underline; text-underline-offset:3px;
    padding:2px; align-self:center;
  }
  .softlink:hover{color:var(--Rd);}
  .foot .hint{font-size:.85rem; color:var(--tx2); text-align:center; margin:0;}

  /* ── 인트로 화면 ── */
  .intro{text-align:center; padding:20px 6px;}
  .intro .big{
    font-family:Georgia,"Noto Serif KR",serif; font-style:italic;
    font-size:2.5rem; color:var(--Rd); margin:10px 0 2px;
  }
  .intro .sub{color:var(--tx2); font-size:1rem; margin:0 0 24px;}
  .intro .lead{
    font-size:1.08rem; color:var(--tx); line-height:1.95; max-width:520px;
    margin:0 auto 18px;
  }
  .intro .lead strong{color:var(--Rd);}
  .flowmap{
    display:flex; flex-wrap:wrap; gap:7px; justify-content:center;
    max-width:560px; margin:22px auto 8px;
  }
  .flowmap .f{
    background:var(--soft); border:1px solid var(--line); border-radius:9px;
    padding:8px 11px; font-size:.8rem; color:var(--tx2); line-height:1.35;
  }
  .flowmap .f.minus{background:var(--minusbg); border-color:var(--minusline); color:var(--minus);}
  .flowmap .f.fin{background:#e6f3e3; border-color:var(--R); color:var(--Rd); font-weight:700;}
  .flowmap .f b{display:block; color:var(--tx); font-family:Georgia,serif; font-size:.72rem;}
  .safe{
    background:#fff8ef; border:1px solid #f0dcbf; border-left:5px solid #e0a04a;
    border-radius:10px; padding:13px 16px; margin:20px auto 0; max-width:520px;
    font-size:.9rem; color:var(--tx2); text-align:left; line-height:1.7;
  }
  .safe b{color:var(--minusd);}

  /* ── 완료 화면 (결 카드) ── */
  .resultcard{
    border:2px solid var(--R); border-radius:16px; margin:6px 0 18px;
    overflow:hidden; box-shadow:0 6px 22px rgba(122,184,122,.16);
  }
  .rc-head{
    background:var(--R); color:#fff; padding:15px 22px; font-weight:700;
    font-size:1.12rem; display:flex; align-items:center; gap:8px;
  }
  .rc-body{padding:6px 22px 18px;}
  .rc-zone{padding:15px 0; border-bottom:1px dashed var(--line);}
  .rc-zone:last-child{border-bottom:none;}
  .rc-zone .zt{
    font-size:.8rem; font-family:Georgia,serif; font-weight:700;
    background:var(--soft); color:var(--Rd); border:1px solid var(--copyline);
    border-radius:14px; padding:2px 11px; display:inline-block; margin-bottom:10px;
  }
  .rc-zone.minusZ .zt{background:var(--minusbg); color:var(--minus); border-color:var(--minusline);}
  .wordset{display:flex; flex-wrap:wrap; gap:8px;}
  .wordset .w{
    background:#e6f3e3; border:1px solid var(--R); color:var(--Rdd);
    border-radius:20px; padding:7px 15px; font-weight:700; font-size:1rem;
  }
  .wordset .w.minus{background:var(--minusbg); border-color:var(--minusline); color:var(--minus);}
  .rc-empty{color:var(--tx2); font-size:.92rem; font-style:italic;}

  .promptbox{
    background:#f6f7fc; border:1px solid #c7cdec; border-left:6px solid #5a6aa0;
    border-radius:10px; padding:16px 18px; margin:14px 0; font-size:.96rem;
    line-height:1.85; color:var(--tx);
  }
  .promptbox .pt{font-weight:700; color:#46538a; margin-bottom:8px; font-size:.92rem;}
  .promptbox .ptext{white-space:pre-wrap;}

  .sendbox{
    background:var(--copybg); border:1px solid var(--copyline); border-left:6px solid var(--R);
    border-radius:10px; padding:16px 18px; margin:14px 0; color:var(--tx);
  }
  .sendbox .pt{font-weight:700; color:var(--Rd); margin-bottom:8px; font-size:.92rem;}
  .sendbox .stext{white-space:pre-wrap; font-size:1rem; line-height:1.8;}

  .copybtn{
    margin-top:10px; background:#fff; border:1.5px solid var(--R); color:var(--Rd);
    font-family:inherit; font-weight:700; font-size:.9rem; border-radius:9px;
    padding:8px 16px; cursor:pointer;
  }
  .copybtn:hover{background:var(--soft);}
  .copybtn.done{background:var(--R); color:#fff;}
  .promptbox .copybtn{border-color:#5a6aa0; color:#46538a;}
  .promptbox .copybtn:hover{background:#eef0fb;}
  .promptbox .copybtn.done{background:#5a6aa0; color:#fff;}

  .disc{
    background:#fff8ef; border:1px solid #f0dcbf; border-radius:10px;
    padding:13px 16px; margin:14px 0; font-size:.92rem; color:var(--tx2); line-height:1.7;
  }
  .disc b{color:var(--minusd);}
  .emph{background:#fff3e0; border-radius:5px; padding:1px 6px; font-weight:700; color:#a8631f;}

  .footer-note{
    margin-top:8px; padding:16px 20px; background:var(--soft);
    border:1px solid var(--line); border-radius:12px;
    color:var(--tx2); font-size:.84rem; line-height:1.7;
  }
  .footer-note .clover{color:var(--R);}

  .demo-flag{
    background:#eef0fb; border:1px solid #c7cdec; color:#46538a;
    font-size:.8rem; border-radius:8px; padding:7px 12px; margin:0 0 14px;
    line-height:1.6;
  }

  @media (max-width:560px){
    body{font-size:16px;}
    .body{padding:18px 16px 16px;}
    .top{padding:16px 16px 12px;}
    .foot{padding:12px 16px 18px;}
    .intro .big{font-size:2.1rem;}
    .chip{padding:11px 15px; font-size:.98rem;}
    .chips{gap:10px;}
  }
  /* 터치 기기: 탭 타깃 최소 44px 확보(Apple 권장) */
  @media (hover:none) and (pointer:coarse){
    .chip{min-height:44px; display:inline-flex; align-items:center;}
    .btn{padding:15px 20px;}
    .copybtn{padding:11px 18px;}
    .softlink{padding:8px;}
  }
</style>
</head>
<body>
<div class="app">

  <!-- 상단 헤더 -->
  <div class="top">
    <div class="brand">maydly<span style="color:#4f9a6a">.</span><svg width='20' height='20' viewBox='0 0 40 40' style='vertical-align:-3px;margin-left:4px'><g fill='#4f9a6a'><path d='M20,20 C16,14 8,13 8,8 C8,4.5 13,3.5 16,6 C18,7.5 19.5,9 20,10.5 C20.5,9 22,7.5 24,6 C27,3.5 32,4.5 32,8 C32,13 24,14 20,20 Z'/><path transform='rotate(90 20 20)' d='M20,20 C16,14 8,13 8,8 C8,4.5 13,3.5 16,6 C18,7.5 19.5,9 20,10.5 C20.5,9 22,7.5 24,6 C27,3.5 32,4.5 32,8 C32,13 24,14 20,20 Z'/><path transform='rotate(180 20 20)' d='M20,20 C16,14 8,13 8,8 C8,4.5 13,3.5 16,6 C18,7.5 19.5,9 20,10.5 C20.5,9 22,7.5 24,6 C27,3.5 32,4.5 32,8 C32,13 24,14 20,20 Z'/><path transform='rotate(270 20 20)' d='M20,20 C16,14 8,13 8,8 C8,4.5 13,3.5 16,6 C18,7.5 19.5,9 20,10.5 C20.5,9 22,7.5 24,6 C27,3.5 32,4.5 32,8 C32,13 24,14 20,20 Z'/></g><path d='M20,20 Q21,29 25,34' stroke='#4f9a6a' stroke-width='2' fill='none' stroke-linecap='round'/></svg></div>
    <div class="stepline">
      <span class="pill" id="pill">시작</span>
      <span class="bar" id="barwrap"><i id="bar"></i></span>
    </div>
  </div>

  <!-- 본문 -->
  <div class="body" id="body"><!-- JS 렌더 --></div>

  <!-- 하단 액션 -->
  <div class="foot" id="foot"><!-- JS 렌더 --></div>

</div>

<script>
/* ─────────────────────────────────────────────
   maydly 촬영 전 · 단어 여정 (체험판 데모)
   단어·문구·결 카드·AI 프롬프트는 v3.0(260620) maydly 창작물.
   진행 구조(20→15→10→5 / 마이너스 / 반대편 / 최종5)만 word-journey식으로 본뜸.
   ───────────────────────────────────────────── */

/* 플러스 단어 풀 (130개, VIA 성격강점 6묶음) */
const PLUS = [
  {g:'지혜와 지식', words:['독창적인','자유로운','즉흥적인','남다른','발랄한','톡톡 튀는','자기만의 결을 가진','두리번거리는','눈을 반짝이는','새것에 끌리는','궁금한 듯 바라보는','탐색하는','시선이 살아있는','분명한','명료한','헷갈리지 않는','또렷한','분간이 가는','정돈된 인상의','몰입한','집중한','깊이 들여다보는','빠져든','한곳에 머무는','진지하게 바라보는','멀리 보는','헤아리는','깊은 눈빛의','사려 깊은','멀리 두는 시선의','무게가 담긴']},

/* ── 상태 ── */
const sel = {}; // key -> Set(word)
STEPS.forEach(s=>{ if(s.key!=='intro'&&s.key!=='done') sel[s.key]=new Set(); });
let idx = 0;
const history = [0];

const $body = document.getElementById('body');
const $foot = document.getElementById('foot');
const $pill = document.getElementById('pill');
const $bar  = document.getElementById('bar');
const $barwrap = document.getElementById('barwrap');

function isMinus(step){ return step.pool==='minus' || step.source==='s5' || step.key==='s6'; }

function dedupePool(pool){
  const seen = new Set(); const out=[];
  pool.forEach(grp=>{
    const ws = grp.words.filter(w=>{ if(seen.has(w))return false; seen.add(w); return true; });
    if(ws.length) out.push({g:grp.g, words:ws});
  });
  return out;
}
const PLUS_D = dedupePool(PLUS);
const MINUS_D = dedupePool(MINUS);

/* ── 렌더 ── */
function render(){
  const step = STEPS[idx];
  // 진행바
  const pct = Math.round((idx)/(STEPS.length-1)*100);
  $bar.style.width = pct+'%';
  const minus = step.kind!=='intro' && step.kind!=='done' && isMinus(step);
  $barwrap.className = 'bar'+(minus?' minus':'');
  $pill.className = 'pill'+(minus?' minus':'')+(step.kind==='done'?' done':'');
  $pill.textContent = step.pill || (step.kind==='done'?'완료':'시작');

  if(step.kind==='intro') return renderIntro();
  if(step.kind==='done')  return renderDone();
  return renderStep(step, minus);
}

function poolFor(step){ return step.pool==='plus' ? PLUS_D : MINUS_D; }

function candidateCount(step){
  let n=0; candidateGroups(step).forEach(g=>n+=g.words.length); return n;
}
function effTarget(step){ return Math.min(step.target, candidateCount(step)); }

function candidateGroups(step){
  // narrow/combo 단계는 이전 선택 단어를 원래 묶음 순서로 보여줌
  let words;
  if(step.kind==='combo'){
    words = new Set();
    step.sources.forEach(s=> sel[s].forEach(w=>words.add(w)));
  } else {
    words = new Set(sel[step.source]);
  }
  const basePool = isMinus(step) ? MINUS_D : PLUS_D;
  // combo는 플러스 기준 묶음으로
  const pool = step.kind==='combo' ? PLUS_D : basePool;
  const out=[];
  pool.forEach(grp=>{
    const ws = grp.words.filter(w=>words.has(w));
    if(ws.length) out.push({g:grp.g, words:ws});
  });
  return out;
}

function renderStep(step, minus){
  const s = sel[step.key];
  const groups = (step.kind==='pick') ? poolFor(step) : candidateGroups(step);

  let html = `<div class="arc${minus?' minus':''}"><span class="nowtag">지금은 —</span>${step.arc}</div>`;
  html += `<p class="guide">${step.guide}</p>`;
  // 카운터는 하단 고정바(renderFoot)로 옮겨, 스크롤 중에도 항상 보이게 함

  groups.forEach((grp)=>{
    html += `<div class="grp"><div class="gh">${grp.g}</div><div class="chips">`;
    grp.words.forEach(w=>{
      const on = s.has(w) ? ' on':'';
      const mc = minus ? ' minus':'';
      html += `<button class="chip${mc}${on}" data-w="${escAttr(w)}" onclick="toggle('${step.key}', this)">${escHtml(w)}</button>`;
    });
    html += `</div></div>`;
  });
  $body.innerHTML = html;
  $body.scrollTop = 0;
  renderFoot(step, minus);
}

function counterHTML(step, minus){
  const n = sel[step.key].size;
  const over = step.target && n>step.target;
  const cls = 'counter'+(minus?' minus':'')+(over?' over':'');
  let goal;
  if(step.kind==='pick') goal = step.min===0 ? `목표 ${step.target}개 (없으면 패스)` : `목표 ${step.target}개`;
  else goal = `목표 ${effTarget(step)}개`;
  return `<div class="${cls}" id="counter">고른 단어 <b>${n}</b>개 · ${goal}</div>`;
}

function updateCounter(step, minus){
  const el = document.getElementById('counter');
  if(el) el.outerHTML = counterHTML(step, minus);
}

function renderFoot(step, minus){
  const n = sel[step.key].size;
  let ok=false, hint='';
  if(step.kind==='pick'){
    ok = n>=step.min && n<=step.max;
    if(n>step.max) hint = `조금 많아요 — ${step.max}개 이하로 줄여주세요.`;
    else if(step.min>0 && n<step.min) hint = `${step.min}개 이상 골라주세요.`;
  } else { // narrow / combo
    const eff = effTarget(step);
    ok = (n===eff);
    if(n>eff) hint = `${n-eff}개만 더 빼주세요.`;
    else if(n<eff && n>0) hint = `${eff-n}개 더 남겨주세요.`;
  }

  let extra='';
  if((step.kind==='narrow'||step.kind==='combo')){
    extra = `<button class="softlink" onclick="autoKeep()">잘 못 줄이겠어요 → 끌리는 순서로 통과</button>`;
  } else if(step.optional && step.min===0){
    extra = `<button class="softlink" onclick="skipMinus()">오늘은 없어요 · 건너뛰기</button>`;
  }

  const pcls = 'btn primary'+(minus?' minus':'');
  const showCounter = (step.kind==='pick'||step.kind==='narrow'||step.kind==='combo');
  $foot.innerHTML = `
    ${showCounter?`<div class="counterbar">${counterHTML(step, minus)}</div>`:''}
    <div class="btnrow">
      <button class="btn ghost" onclick="back()">이전</button>
      <button class="btn ${pcls}" id="nextbtn" onclick="next()" ${ok?'':'disabled'}>다음</button>
    </div>
    ${hint?`<p class="hint">${hint}</p>`:''}
    ${extra}`;
}

/* ── 상호작용 ── */
function toggle(key, btn){
  const step = STEPS[idx];
  const w = btn.getAttribute('data-w');
  const s = sel[key];
  if(s.has(w)) s.delete(w); else s.add(w);
  btn.classList.toggle('on');
  const minus = isMinus(step);
  renderFoot(step, minus); // 하단 고정 카운터 + 다음버튼 상태 갱신
}

function autoKeep(){
  const step = STEPS[idx];
  // 현재 후보 순서대로 앞에서 target개만 유지
  const groups = candidateGroups(step);
  const ordered=[]; groups.forEach(g=>g.words.forEach(w=>ordered.push(w)));
  sel[step.key] = new Set(ordered.slice(0, step.target));
  render();
}

function skipMinus(){
  // s5 건너뛰기 → s5,s6 비우고 s7로
  sel['s5'].clear(); sel['s6'].clear();
  goTo(indexOf('s7'));
}

function indexOf(key){ return STEPS.findIndex(s=>s.key===key); }

function seedNarrow(step){
  // 유효 후보만 남기도록 먼저 정리(뒤로 가서 앞 단계를 바꾼 경우 대비)
  const groups = candidateGroups(step);
  const valid = new Set(); groups.forEach(g=>g.words.forEach(w=>valid.add(w)));
  Array.from(sel[step.key]).forEach(w=>{ if(!valid.has(w)) sel[step.key].delete(w); });
  // 아직 아무것도 안 남겼고, 후보가 목표 이하이면 전부 자동 유지(더 줄일 수 없음)
  if(sel[step.key].size===0 && valid.size<=step.target){
    valid.forEach(w=>sel[step.key].add(w));
  }
}

function next(){
  const step = STEPS[idx];
  // 마이너스를 하나도 안 골랐으면 6단계는 건너뛴다
  if(step.key==='s5' && sel['s5'].size===0){ sel['s6'].clear(); goTo(indexOf('s7')); return; }
  goTo(idx+1);
}

function goTo(newIdx){
  idx = newIdx;
  const step = STEPS[idx];
  if(step && (step.kind==='narrow'||step.kind==='combo')) seedNarrow(step);
  if(history[history.length-1]!==idx) history.push(idx);
  render();
}

function back(){
  if(history.length>1){ history.pop(); idx=history[history.length-1]; }
  else if(idx>0){ idx--; }
  render();
}

          ${avoid.length
            ? `<div class="wordset">${avoid.map(w=>`<span class="w minus">${escHtml(w)}</span>`).join('')}</div>`
            : `<div class="rc-empty">따로 빼둔 결은 없어요. 괜찮아요 :)</div>`}
        </div>
      </div>
    </div>

    <div class="sendbox">
      <div class="pt">✉️ 명진에게 이대로 보내면 돼요</div>
      <div class="stext" id="sendtext">${escHtml(sendText)}</div>
      <button class="copybtn" id="copysend" onclick="copyText('sendtext','copysend')">이 내용 복사하기</button>
    </div>

    <div class="promptbox">
      <div class="pt">🤖 (선택) 나를 한 번 더 들여다보고 싶다면</div>
      <p style="margin:0 0 6px; color:var(--tx2); font-size:.92rem;">아래 문장을 ChatGPT 같은 AI에 붙여넣으면, 이 단어들이 나에게 어떤 의미인지 한 번 더 볼 수 있어요.</p>
      <div class="ptext" id="prompttext">${escHtml(prompt)}</div>
      <button class="copybtn" id="copyprompt" onclick="copyText('prompttext','copyprompt')">프롬프트 복사하기</button>
    </div>

    <div class="disc">
      여기서 나온 단어와 AI 해석은 <b>참고</b>예요. <span class="emph">실제로 어떤 결로 담을지는 이걸 보고 제가 직접 잡습니다.</span>
      단어로 시작해서, 결은 maydly가 잡을게요.
    </div>

    <div class="footer-note">
      <span class="clover">🍀</span> <b>체험판 데모입니다.</b> 실제 고객 발송·광고 노출 전에는 명진님 톤 확정이 필요해요.
      (단어·문구·결 카드는 v3.0 설계안 기준, 마이너스 표현 강도 조절 등 최종 검토 전)
    </div>`;

  $foot.innerHTML = `
    <div class="btnrow">
      <button class="btn ghost" onclick="back()">이전</button>
      <button class="btn primary" onclick="restart()">처음부터 다시</button>
    </div>`;
  $body.scrollTop = 0;
}

function restart(){
  Object.keys(sel).forEach(k=>sel[k].clear());
  idx=0; history.length=0; history.push(0);
  render();
}

/* ── 복사 ── */
function copyText(srcId, btnId){
  const txt = document.getElementById(srcId).innerText;
  const btn = document.getElementById(btnId);
  const done = ()=>{ btn.classList.add('done'); btn.textContent='복사됐어요 ✓'; setTimeout(()=>{btn.classList.remove('done');}, 1800); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallbackCopy(txt, done));
  } else fallbackCopy(txt, done);
}
function fallbackCopy(txt, cb){
  const ta=document.createElement('textarea'); ta.value=txt;
  ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta);
  ta.select(); try{ document.execCommand('copy'); cb(); }catch(e){} document.body.removeChild(ta);
}

/* ── 유틸 ── */
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

/* 시작 */
render();
</script>
</body>
</html>
